;设置规则标志位
;========================
; 代理组 — Smart 版
;========================
;--- 核心策略组 ---
; 🚀 节点选择：smart 模式，从所有订阅节点中自动选出最优
custom_proxy_group=🚀 节点选择`smart`.*`http://www.gstatic.com/generate_204`300,3000,50
; ♻️ 自动选择：url-test 模式（轻量替代），自动选最低延迟节点，作为 smart 的备选入口
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
; 🚀 手动切换：保留 select 供手动覆盖
custom_proxy_group=🚀 手动切换`select`.*
; 🔯 故障转移：fallback 兜底
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`60,,50
; 🔮 负载均衡：load-balance
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`300
;--- 地区节点 Smart 分组（替换原来的 url-test） ---
; smart 策略会综合延迟、丢包、速度进行自适应切换，tolerance=30 表示当前节点延迟
; 超过最优节点 30ms 才切换，避免频繁抖动
custom_proxy_group=🇭🇰 香港节点`smart`(港|HK|hk|Hong Kong|HongKong|hongkong)`http://www.gstatic.com/generate_204`300,2000,30
