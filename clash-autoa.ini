custom_proxy_group=🇯🇵 日本节点`url-test`(日|JP|Japan|Tokyo)`http://www.gstatic.com/generate_204`300,,40
custom_proxy_group=🇺🇲 美国节点`url-test`(美|US|United.*States|洛杉矶|硅谷)`http://www.gstatic.com/generate_204`300,,100  ; x86增加容忍度
custom_proxy_group=🇨🇳 台湾节点`url-test`(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,30
custom_proxy_group=🇸🇬 狮城节点`url-test`(新|SG|Singapore)`http://www.gstatic.com/generate_204`300,,30
custom_proxy_group=🇰🇷 韩国节点`url-test`(韩|KR|Korea|首尔)`http://www.gstatic.com/generate_204`300,,35

