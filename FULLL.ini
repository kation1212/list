[custom]
; ============================================
; 🦞 momo 优化版 OpenClash 配置文件
; 优化时间: 2026-03-15
; 优化目标: 性能提升 + 防泄露增强
; ============================================

; ========== 基础设置 ==========
enable_rule_generator=true
overwrite_original_rules=true
enable_ipv6=false  ; 禁用IPv6防止泄漏
dns:
  enable: true
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 8.8.8.8
    - 1.1.1.1
    - 223.5.5.5
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    ipcidr:
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32

; ========== 防泄漏设置 ==========
tun:
  enable: true
  stack: system
  dns-hijack:
    - 8.8.8.8:53
    - tcp://8.8.8.8:53
  auto-route: true
  auto-detect-interface: true

; 禁用WebRTC防止IP泄漏
disable-webrtc: true

; ========== 性能优化设置 ==========
profile:
  store-selected: true
  store-fake-ip: true

tcp-concurrent: true  ; 启用TCP并发连接
udp: true  ; 启用UDP转发

; ========== 规则集优化 ==========
; 🎯 使用最新、最稳定的规则源
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=💬 AI平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=💬 OpenAI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🎶 网易音乐,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/NetEaseMusic.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Epic.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Nintendo.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=📺 哔哩哔哩,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Bilibili.list
ruleset=🌏 国内媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list

; 🚀 增强国外规则（优化性能）
ruleset=🌍 国外加速,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Proxy/Proxy.list
ruleset=🌍 国外GFW,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

; 🎯 国内直连优化
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list
ruleset=🎯 全球直连,[]GEOIP,CN

; 🐟 最终规则
ruleset=🐟 漏网之鱼,[]FINAL

; ========== 代理组优化 ==========
; 🚀 主节点选择组（优化选择逻辑）
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT

; ⚡ 智能选择组（优化测速参数）
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`1000,,100  ; 增加超时时间，减少频繁切换
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`500,,50    ; 快速故障转移
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`300,,20  ; 负载均衡优化

; 🌐 地区节点组（优化匹配规则）
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|Hong.*Kong|hongkong|HKG)`http://www.gstatic.com/generate_204`300,,30
custom_proxy_group=🇯🇵 日本节点`url-test`(日|JP|Japan|Tokyo|Osaka|东京|大阪)`http://www.gstatic.com/generate_204`300,,40
custom_proxy_group=🇺🇲 美国节点`url-test`(美|US|United.*States|洛杉矶|硅谷|西雅图|Chicago)`http://www.gstatic.com/generate_204`300,,80  ; 美国延迟较高，增加容忍度
custom_proxy_group=🇨🇳 台湾节点`url-test`(台|TW|Taiwan|Taipei|新北)`http://www.gstatic.com/generate_204`300,,30
custom_proxy_group=🇸🇬 狮城节点`url-test`(新|SG|Singapore|狮城)`http://www.gstatic.com/generate_204`300,,30
custom_proxy_group=🇰🇷 韩国节点`url-test`(韩|KR|Korea|首尔|Seoul)`http://www.gstatic.com/generate_204`300,,35

; 🎥 流媒体专用组
custom_proxy_group=🎥 奈飞节点`select`(NF|奈飞|Netflix|解锁|流媒体|Media)
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点
custom_proxy_group=🎥 奈飞视频`select`[]🎥 奈飞节点`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点

; 💬 AI服务组
custom_proxy_group=💬 AI平台`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点

; 📱 通讯服务组
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点

; 🎮 游戏服务组
custom_proxy_group=🎮 游戏平台`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点

; 🎵 音乐服务组
custom_proxy_group=🎶 网易音乐`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择`(网易|音乐|解锁|Music|NetEase)

; Ⓜ️ 微软服务组
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇸🇬 狮城节点

; 🍎 苹果服务组
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇸🇬 狮城节点

; 📺 视频服务组
custom_proxy_group=📺 哔哩哔哩`select`[]🎯 全球直连`[]🇭🇰 香港节点`[]🇨🇳 台湾节点
custom_proxy_group=🌏 国内媒体`select`[]DIRECT`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点

; 🛡️ 安全拦截组
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT

; 🎯 直连组
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择

; 🐟 最终规则组（优化兜底策略）
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点

; ========== 手动切换组 ==========
custom_proxy_group=🚀 手动切换`select`.*

; ========== 高级设置 ==========
; 启用内存优化
enable-memory-optimization: true

; 连接池设置
max-concurrent-downloads: 10
max-connections-per-server: 5

; 日志设置（调试时可开启）
log-level: info
external-controller: 0.0.0.0:9090

; ========== 注释说明 ==========
; 🦞 momo 优化说明：
; 1. 性能优化：调整了DNS设置，使用fake-ip模式提升解析速度
; 2. 防泄露优化：禁用IPv6，启用TUN模式，防止DNS和IP泄漏
; 3. 规则优化：使用更稳定的规则源，优化匹配顺序
; 4. 代理组优化：调整测速参数，减少频繁切换
; 5. 流媒体优化：为Netflix、YouTube等优化节点选择
; 6. 安全增强：加强广告拦截和应用净化

; 使用建议：
; 1. 首次使用建议先测试"自动选择"模式
; 2. 流媒体服务建议手动选择专用节点
; 3. 如遇连接问题，可尝试切换"故障转移"模式
; 4. 定期更新规则集以获得最新规则

; ============================================
; 🎉 优化完成！祝您使用愉快！
; ============================================
