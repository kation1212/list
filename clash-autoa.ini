; ========== X86专用性能注释 ==========
; 
; 🦞 momo X86优化说明：
; 
; 1. 🚀 性能优化
;    - 精简规则集：从80+减少到40+，提升匹配速度
;    - 延长测速间隔：自动选择600秒(10分钟)，减少CPU占用
;    - 优化匹配逻辑：合并相似规则，
