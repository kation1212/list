·[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则 — Smart 策略自动切换版本（优化版）
;基于 https://raw.githubusercontent.com/kation1212/list/refs/heads/main/clash-auto.ini 改写
;主要改动：
;  1. 🚀 节点选择 → smart 策略（自动测速+故障转移+延迟权重）
;  2. ♻️ 自动选择 → url-test 策略（轻量自动选最优延迟，避免与smart重复）
;  3. 各地区节点 → smart 策略（替换 url-test，含延迟容忍 tolerance）
;  4. 新增 🔮 Smart总选 作为默认入口（汇聚所有地区 smart 节点）
;  5. 🚀 手动切换 保留 select 供手动覆盖
;
; ========== 优化记录 ==========
;  [高] 增加 ChinaIp.list，补全国内 IP 直连覆盖
;  [高] 删除 AmazonIp.list，避免非 Netflix 的 AWS 流量被误路由
;  [高] 漏网之鱼默认改为 🚀 节点选择，避免新出现的被墙站点走直连
;  [中] 删除冗余的 Clash/GoogleCN.list（已被 Ruleset/GoogleCN.list 完整覆盖）
;  [中] 规则源改用 jsdelivr CDN 镜像，提升国内更新可靠性
;  [中] 直连规则集中整理，SteamCN 添加顺序注释
;  [低] 增加欧洲节点分组（如订阅含欧洲节点可启用）
;  [低] 美国节点 tolerance 调整为 80ms，减少频繁切换
;  [低] 排除 SS2022 节点（2022-blake3-aes-256-gcm 密钥 base64 格式与 mihomo 不兼容）
; ==========================================
;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持
;========================
; 节点过滤（排除有问题的节点）
;========================
; 排除 SS2022 节点：cipher 2022-blake3-aes-256-gcm 的密钥使用 URL-safe base64，
; mihomo 内核仅支持标准 base64，导致 "illegal base64 data at input byte 40" 报错
; 如后续升级 mihomo 至兼容版本，可删除此行
exclude=cloud-links.org
