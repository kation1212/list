[custom]
;不要随意改变关键字，否则会导致出错
;acl4SSR规则 — 优化版 v2
;优化内容：
;  1. 拦截规则(广告/隐私)提前到 LAN 之后，减少无效请求
;  2. kation1212 宽泛 Proxy.list 从第3位移到精确服务规则之后
;     原因：该列表含 DOMAIN-KEYWORD,google 等宽泛匹配，
;     且原分组默认 DIRECT，导致 Google/AI/Telegram/Discord 等被墙域名走直连超时
;  3. 🎯 全球加速 默认从 DIRECT 改为 节点选择（该列表含大量被墙域名）
;  4. 🕊️ Twitter(X) 默认从 DIRECT 改为 节点选择（Twitter 在国内被墙）
;  5. 启用 clash_rule_base 基础模板

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

;设置规则标志位

; ====== 1. 本地网络（必须最前）======
ruleset=🎯 本地直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list

; ====== 2. 拦截规则（提前拦截，减少无效请求，加速页面加载）======
