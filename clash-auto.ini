;不要随意改变关键字，否则会导致出错
;acl4SSR规则 — Smart 策略自动切换版本
;基于 https://raw.githubusercontent.com/kation1212/list/refs/heads/main/clash-auto.ini 改写
;主要改动：
;  1. 🚀 节点选择 → smart 策略（自动测速+故障转移+延迟权重）
;  2. ♻️ 自动选择 → url-test 策略（轻量自动选最优延迟，避免与smart重复）
;  3. 各地区节点 → smart 策略（替换 url-test，含延迟容忍 tolerance）
;  4. 新增 🔮 Smart总选 作为默认入口（汇聚所有地区 smart 节点）
;  5. 🚀 手动切换 保留 select 供手动覆盖

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

